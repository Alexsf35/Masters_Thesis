services:

  build:
    image: biocypher/base:1.2.0
    # Adicionamos user para não haver conflitos de ficheiros criados
    user: "${UID}:${GID}"
    volumes:
      - biocypher_neo4j_volume:/usr/app/data
      - .:/src/:z
    command:
      - /bin/bash
      - /src/scripts/build.sh

  import:
    image: neo4j:4.4-enterprise
    user: "${UID}:${GID}"
    environment:
      NEO4J_AUTH: none
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      FILL_DB_ON_STARTUP: "yes"
    volumes:
      - biocypher_neo4j_volume:/data
      - ./scripts/import.sh:/scripts/import.sh:Z
      - ./${IMPORT_DIR}:/data/build2neo:Z
    command:
      - /bin/bash
      - -c
      - "/scripts/import.sh --report-file=/tmp/import.report"
  deploy:
    image: neo4j:4.4-enterprise
    user: "${UID}:${GID}"
    volumes:
      - biocypher_neo4j_volume:/data
    environment:
      NEO4J_dbms_security_auth__enabled: "false"
      NEO4J_dbms_databases_default__to__read__only: "false"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    #depends_on:
      #import:
        #condition: service_completed_successfully

volumes:
  biocypher_neo4j_volume: